<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1400"
  height="180"
  viewBox="0 0 1400 180"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">JuridicAI footer</title>
  <desc id="desc">Minimal JuridicAI footer banner.</desc>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="48%" stop-color="#1CD6F4" />
      <stop offset="100%" stop-color="#2FAC68" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.045" />
    </pattern>
    <style>
      .sans {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
    </style>
  </defs>

  <rect width="1400" height="180" fill="#101214" />
  <rect width="1400" height="180" fill="url(#grid)" />
  <rect x="86" y="42" width="1228" height="96" rx="16" fill="#171A1D" stroke="#2D3136" />
  <rect x="86" y="42" width="1228" height="5" rx="2.5" fill="url(#bar)" />

  <g transform="translate(540 68)">
    <rect width="44" height="44" rx="11" fill="#F97316" />
    <path
      d="M13 33 L22 11 L31 33 H25.8 L24.4 29 H19.6 L18.2 33 Z M21.1 24.7 H22.9 L22 22.1 Z"
      fill="#FFFFFF"
    />
  </g>

  <g class="sans">
    <text x="604" y="97" fill="#F8FAFC" font-size="28" font-weight="900">JuridicAI</text>
    <text x="746" y="97" fill="#A1A5B7" font-size="18" font-weight="650">
      Evidence-led precatório intelligence
    </text>
  </g>
</svg>
