<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1400"
  height="170"
  viewBox="0 0 1400 170"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Built for auditable opportunity decisions</title>
  <desc id="desc">Footer banner for the JuridicAI README.</desc>
  <defs>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" />
    </pattern>
  </defs>
  <rect width="1400" height="170" fill="#101214" />
  <rect width="1400" height="170" fill="url(#grid)" />
  <rect x="76" y="44" width="1248" height="82" rx="14" fill="#181A1D" stroke="#2D3136" />
  <rect x="76" y="44" width="7" height="82" rx="3.5" fill="#F97316" />
  <text
    x="700"
    y="78"
    text-anchor="middle"
