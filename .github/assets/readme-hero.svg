<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1400"
  height="440"
  viewBox="0 0 1400 440"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">JuridicAI</title>
  <desc id="desc">JuridicAI brand banner for precatório intelligence.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101214" />
      <stop offset="54%" stop-color="#171A1D" />
      <stop offset="100%" stop-color="#0B0D0F" />
    </linearGradient>
    <linearGradient id="brandLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="48%" stop-color="#1CD6F4" />
      <stop offset="100%" stop-color="#2FAC68" />
    </linearGradient>
    <linearGradient id="markFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#FFFFFF" stroke-opacity="0.045" />
    </pattern>
    <filter id="shadow" x="-10%" y="-14%" width="120%" height="128%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.38" />
    </filter>
    <style>
      .sans {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
    </style>
  </defs>

  <rect width="1400" height="440" fill="url(#background)" />
  <rect width="1400" height="440" fill="url(#grid)" />

  <g transform="translate(60 50)" filter="url(#shadow)">
    <rect width="1280" height="340" rx="18" fill="#101214" stroke="#2D3136" />
    <rect x="1" y="1" width="1278" height="5" rx="2.5" fill="url(#brandLine)" />

    <g transform="translate(92 74)">
      <rect width="132" height="132" rx="30" fill="url(#markFill)" />
      <path
        d="M39 97 L66 32 L93 97 H77.5 L73.2 84.9 H58.8 L54.5 97 Z M63.4 72 H68.6 L66 64.5 Z"
        fill="#FFFFFF"
      />
      <path
        d="M35 112 H97"
        stroke="#FFFFFF"
        stroke-opacity="0.66"
        stroke-width="6"
        stroke-linecap="round"
      />
    </g>

    <g class="sans" transform="translate(262 92)">
      <text x="0" y="74" fill="#F8FAFC" font-size="72" font-weight="900">JuridicAI</text>
      <text x="4" y="118" fill="#CBD5E1" font-size="25" font-weight="650">
        Precatório Intelligence Desk
      </text>
      <rect x="4" y="150" width="436" height="3" rx="1.5" fill="url(#brandLine)" />
    </g>

    <g transform="translate(875 82)">
      <rect x="0" y="0" width="280" height="176" rx="18" fill="#171A1D" stroke="#2D3136" />
      <circle cx="58" cy="58" r="12" fill="#F97316" />
      <circle cx="140" cy="58" r="12" fill="#1CD6F4" />
      <circle cx="222" cy="58" r="12" fill="#2FAC68" />
      <path d="M70 58 H128" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
      <path d="M152 58 H210" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
      <rect x="42" y="100" width="196" height="14" rx="7" fill="#2D3136" />
      <rect x="42" y="128" width="144" height="14" rx="7" fill="#2D3136" />
    </g>
  </g>
</svg>
