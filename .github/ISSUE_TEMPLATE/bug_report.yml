name: Bug report
description: Report a reproducible defect in JuridicAI.
title: 'bug: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, production data, or raw PII.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The tribunal sync job fails when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact commands, routes, inputs, or job options.
      placeholder: |
        1. Run `node ace ...`
        2. Open `/operations/...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation attempted
      description: Include relevant checks such as `pnpm test`, `pnpm typecheck`, or focused Japa files.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or public source URLs. Redact sensitive data.
