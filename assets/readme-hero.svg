    <text x="26" y="34" fill="#42d392">source_records</text>
    <text x="205" y="34" fill="#94a3b8">-&gt;</text>
    <text x="244" y="34" fill="#38bdf8">assets</text>
    <text x="26" y="62" fill="#f5c451">pii.bunker</text>
    <text x="159" y="62" fill="#94a3b8">+</text>
    <text x="188" y="62" fill="#f8fafc">append-only audit</text>
  </g>
