<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1400"
  height="420"
  viewBox="0 0 1400 420"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">JuridicAI - Radar Federal Base</title>
  <desc id="desc">A governed legal intelligence platform for federal precatorio assets.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="48%" stop-color="#11283a" />
      <stop offset="100%" stop-color="#17221d" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42d392" />
      <stop offset="45%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#f5c451" />
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path
        d="M 44 0 L 0 0 0 44"
        fill="none"
        stroke="#ffffff"
        stroke-opacity="0.055"
        stroke-width="1"
      />
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="0" fill="url(#background)" />
  <rect width="1400" height="420" fill="url(#grid)" />

  <g opacity="0.7">
    <path
      d="M82 320 C240 190 330 360 480 225 S780 175 910 92 S1150 110 1296 42"
      fill="none"
      stroke="#38bdf8"
      stroke-opacity="0.24"
      stroke-width="3"
    />
    <path
      d="M120 356 C288 270 370 302 530 230 S760 92 940 166 S1150 260 1320 116"
      fill="none"
      stroke="#42d392"
      stroke-opacity="0.28"
      stroke-width="2"
    />
    <path
      d="M176 93 C350 132 410 86 590 142 S810 308 1000 214 S1170 76 1308 188"
      fill="none"
      stroke="#f5c451"
      stroke-opacity="0.22"
      stroke-width="2"
    />
  </g>

  <g filter="url(#softGlow)">
    <circle cx="975" cy="96" r="8" fill="#42d392" />
    <circle cx="1114" cy="252" r="7" fill="#38bdf8" />
    <circle cx="1260" cy="154" r="9" fill="#f5c451" />
    <circle cx="834" cy="294" r="6" fill="#42d392" />
  </g>

  <g transform="translate(80 78)">
    <rect
      x="0"
      y="0"
      width="86"
      height="86"
      rx="18"
      fill="#0f1f2d"
      stroke="#42d392"
      stroke-opacity="0.48"
    />
    <path d="M43 17 L65 58 H54 L49 49 H35 L30 58 H20 L43 17 Z M39 41 H45 L42 34 Z" fill="#42d392" />
    <path d="M74 22 V64" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" />
    <text
      x="0"
      y="140"
      fill="#f8fafc"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="78"
      font-weight="800"
      letter-spacing="0"
    >
      juridicai
    </text>
    <text
      x="4"
      y="184"
      fill="#b9c8d6"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="28"
      font-weight="600"
