    >
      SIOP history - tenant-safe governance - legal asset intelligence
    </text>
    <rect x="4" y="266" width="440" height="6" rx="3" fill="url(#accent)" />
  </g>

  <g
    transform="translate(860 270)"
    font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
