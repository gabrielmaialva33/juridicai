services:
  juridicai-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: juridicai:beta
    container_name: juridicai-app
    restart: unless-stopped
    env_file:
      - .env.production
    network_mode: host
    command: ['node', 'bin/server.js']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(`http://127.0.0.1:${process.env.PORT || 3333}/healthz`).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  juridicai-worker:
    image: juridicai:beta
    container_name: juridicai-worker
    restart: unless-stopped
    env_file:
      - .env.production
    network_mode: host
    command: ['node', 'bin/worker.js']
    depends_on:
      juridicai-app:
        condition: service_healthy
